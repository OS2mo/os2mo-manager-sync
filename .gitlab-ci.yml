stages:
  - lint
  - build
  - test
  - coverage
  - release
  - deploy


variables:
  IMAGE_SHA: ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}

  RELEASE_REGISTRY: docker.io
  RELEASE_REGISTRY_IMAGE: index.docker.io/magentaaps/os2mo-manager-sync

  PYTEST_COV_MODULE: sd_managerscript
  PYTEST_COV_FAIL_UNDER: 80

  PRECOMMIT_USE_POETRY: "true"
  POETRY_VERSION: "1.7"

  PRODUCT: os2mo
  COMPONENT: manager-sync

  OS2MO_INIT_CONFIG: "/builds/$CI_PROJECT_PATH/init.config.yml"

# Conditions
#############
.if-default-branch-refs: &if-default-branch-refs
  if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

.if-tag: &if-tag
  if: '$CI_COMMIT_TAG'

.if-merge-request: &if-merge-request
  if: '$CI_MERGE_REQUEST_IID'

# Workflow
###########
workflow:
  rules:
    - <<: *if-tag
    - <<: *if-default-branch-refs
    - <<: *if-merge-request


include:
  - project: labs/salt-automation
    file:
    - gitlab-ci-templates/common/conventional-commits.v1.yml
    - gitlab-ci-templates/common/docker-release.v1.yml
    - gitlab-ci-templates/common/docker-build.v1.yml
    - gitlab-ci-templates/common/config-updater-flux.v1.yml
    - gitlab-ci-templates/common/config-updater-salt.v1.yml
  - project: labs/salt-automation
    file:
      - gitlab-ci-templates/common/pre-commit.v1.yml
      - gitlab-ci-templates/python/pytest-meta.v1.yml
    rules:
      - <<: *if-merge-request
  - project: rammearkitektur/os2mo
    file:
      - gitlab-ci-templates/integration-test-meta.v1.yml

Unit-test:
  extends:
    - .pytest
  variables:
    PYTEST_ADDOPTS: "-m 'not integration_test'"

Integration-test:
  extends:
    - .integration-test:mo
  rules:
    - <<: *if-merge-request

Export coverage:
  extends: .export_coverage

Check coverage:
  extends: .check_coverage
