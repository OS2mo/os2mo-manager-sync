}

mutation _Testing_CreateOrgUnit($name: String!, $parent: UUID, $org_unit_type: UUID!, $org_unit_level: UUID) {
  org_unit_create(
    input: {
      name: $name,
      parent: $parent,
      org_unit_type: $org_unit_type,
      org_unit_level: $org_unit_level,
      validity: {from: "2010-01-01"},
    },
  ) {
    uuid
    current {
      org_unit_level {
        user_key
      }
    }
  }
}

mutation _Testing_CreateEmployee($first_name: String!, $last_name: String!) {
  employee_create(input: {given_name: $first_name, surname: $last_name}) {
    uuid
  }
}

mutation _Testing_CreateAssociation(
  $org_unit: UUID!
  $person: UUID!
  $association_type: UUID!
  $from: DateTime = "2016-05-05"
  $to: DateTime = null
) {
  association_create(
    input: {
      org_unit: $org_unit
      association_type: $association_type
      person: $person
      validity: { from: $from, to: $to }
    }
  ) {
    uuid
  }
}

mutation _Testing_CreateEngagement(
  $orgunit: UUID!
  $person: UUID!
  $engagement_type: UUID!
  $job_function: UUID!
  $from: DateTime = "2016-05-05"
  $to: DateTime = null
) {
  engagement_create(
    input: {
      org_unit: $orgunit
      engagement_type: $engagement_type
      job_function: $job_function
      person: $person
      validity: { from: $from, to: $to }
    }
  ) {
    uuid
  }
}

mutation _Testing_CreateManager(
  $orgunit: UUID!
  $person: UUID!
  $manager_level: UUID!
  $manager_type: UUID!
  $responsibility: UUID!
  $from: DateTime = "2016-05-05"
  $to: DateTime = null
) {
  manager_create(
    input: {
      org_unit: $orgunit
      manager_level: $manager_level
      manager_type: $manager_type
      responsibility: [$responsibility]
      person: $person
      validity: { from: $from, to: $to }
    }
  ) {
    uuid
  }
}
