query RootManagerEngagements($uuid: UUID!){
    org_units (filter: { uuids: [$uuid] }){
        objects {
            validities {
                uuid
                has_children
                managers {
                    uuid
                    employee {
                        engagements {
                            org_unit {
                                name
                                uuid
                                parent {
                                    name
                                    uuid
                                }
                            }
                            validity {
                                from
                                to
                            }
                        }
                    }
                }
            }
        }
    }
}

query ManagerEngagements($uuid: UUID!){
    org_units (filter: { parent: { uuids: [$uuid] } }){
        objects {
            validities {
                uuid
                has_children
                managers{
                    uuid
                    employee {
                        engagements {
                            org_unit {
                                name
                                uuid
                                parent {
                                    name
                                    uuid
                                }
                            }
                            validity {
                                from
                                to
                            }
                        }
                    }
                }
            }
        }
    }
}

query LederOrgUnits($from_date: DateTime!) {
    org_units(filter: { query: "_leder" }) {
        objects {
            validities {
                uuid
                name
                associations(filter: { from_date: $from_date }) {
                    uuid
                    employee_uuid
                    org_unit_uuid
                    association_type_uuid
                    validity {
                        from
                        to
                    }
                }
                parent {
                    uuid
                    name
                    parent_uuid
                    org_unit_level_uuid
                }
            }
        }
    }
}

query Engagements($uuid: UUID!){
    engagements (filter: { employee: { uuids: [$uuid], from_date: null, to_date: null }} ){
        objects {
            validities {
                org_unit_uuid
                validity{
                    from
                    to
                }
            }
        }
    }
}

query CurrentManagers{
    managers {
        objects {
            current {
                uuid
                employee_uuid
                org_unit_uuid
            }
        }
    }
}

query OrgUnitLevel($uuids: UUID!) {
    org_units (filter: {uuids: [$uuids]}) {
        objects {
            validities {
                uuid
                name
                org_unit_level {
                    user_key
                }
                parent {
                    uuid
                    org_unit_level {
                        user_key
                    }
                }
            }
        }
    }
}

query ManagerLevel($user_key: String!) {
    classes(filter: { user_keys: [$user_key] }) {
        objects {
            validities {
                uuid
            }
        }
    }
}

mutation CreateManager($input: ManagerCreateInput!) {
    manager_create(input: $input) {
        uuid
    }
}

mutation CreateManagers($input: [ManagerCreateInput!]!) {
    managers_create(input: $input) {
        uuid
    }
}

mutation UpdateManager($input: ManagerUpdateInput!) {
    manager_update(input: $input) {
        uuid
    }
}

mutation TerminateManager($input: ManagerTerminateInput!){
    manager_terminate(input: $input){
        uuid
    }
}

mutation TerminateAssociation($input: AssociationTerminateInput!){
    association_terminate(input: $input){
        uuid
    }
}

